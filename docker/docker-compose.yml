services:
  summer-school-rl:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: summer-school-rl:latest
    container_name: summer-school-rl
    working_dir: /workspace/SUMMER-SCHOOL-RL
    network_mode: host
    ipc: host
    privileged: true
    environment:
      - DISPLAY=${DISPLAY}
      - PYTHONUNBUFFERED=1
    volumes:
      - ..:/workspace/SUMMER-SCHOOL-RL
      - /tmp/.X11-unix:/tmp/.X11-unix
    stdin_open: true
    tty: true
    command: bash
